<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — PDFyre</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080d;--card:#131520;--border:#1e2133;--fire:#ff6b1f;--fire-2:#ff8c42;--text:#e4e6f0;--text-2:#8890b8;--text-3:#4a5070;--font:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.3;pointer-events:none}
.wrap{text-align:center;position:relative;z-index:1;max-width:440px}
.logo{display:flex;align-items:center;justify-content:center;gap:9px;font-weight:800;font-size:1.2rem;letter-spacing:-.04em;text-decoration:none;color:var(--text);margin-bottom:40px}
.logo-icon{width:32px;height:32px;background:linear-gradient(145deg,#ff8c42,#ff6b1f,#c24c10);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 10px rgba(255,107,31,.35)}
.logo-wordmark{letter-spacing:-.045em}.yre{color:#ff8c42}
.code{font-size:6rem;font-weight:800;letter-spacing:-.06em;line-height:1;background:linear-gradient(135deg,var(--fire-2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
h1{font-size:1.3rem;font-weight:700;margin-bottom:10px}
p{font-size:.87rem;color:var(--text-2);line-height:1.7;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#ff8c42,#ff6b1f,#c24c10);color:#fff;font-weight:700;font-size:.88rem;padding:12px 26px;border-radius:8px;text-decoration:none;box-shadow:0 2px 12px rgba(255,107,31,.3);transition:all .16s}
.btn:hover{transform:translateY(-1px);box-shadow:0 5px 22px rgba(255,107,31,.42)}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="logo">
    <div class="logo-icon">🔥</div>
    <span class="logo-wordmark">PDF<span class="yre">yre</span></span>
  </a>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.<br>Head back to the tools and get to work.</p>
  <a href="index.html" class="btn">🔥 Back to PDFyre</a>
</div>
</body>
</html>
